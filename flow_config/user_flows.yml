slots:
  order_number:
    type: text
    label: 订单号
    description: 用户的听书订单号（订单 ID 或订单号 ORD 开头）

  order_id:
    type: text
    label: 订单ID
    description: 订单主键 ID，用于生成可点击的订单卡片

  order_no:
    type: text
    label: 订单编号
    description: ORD 开头的订单编号，用于卡片展示

  order_status:
    type: text
    label: 订单状态
    description: 订单当前状态

  order_summary:
    type: text
    label: 订单摘要
    description: 订单金额、购买内容等摘要信息

  order_candidates_available:
    type: boolean
    label: 是否有候选订单
    description: 当前用户是否有可供选择的订单

  order_found:
    type: boolean
    label: 是否查到订单
    description: 指定订单是否存在且属于当前用户

  book_name:
    type: text
    label: 书名
    description: 用户想查询播放进度的有声书名称

  playback_summary:
    type: text
    label: 播放进度摘要
    description: 最近播放的章节、进度位置、播放时间

  refund_reason:
    type: text
    label: 退款原因
    description: 用户申请退款的原因

  refund_type:
    type: text
    label: 退款类型
    description: 退款类型，如 全额退款、部分退款

  refund_result:
    type: text
    label: 退款结果
    description: 退款申请的处理结果

  refund_order_valid:
    type: boolean
    label: 退款订单是否有效
    description: 订单是否通过退款前置检查

  ticket_category:
    type: text
    label: 工单类型
    description: 工单类型，如 播放异常、投诉、退款、账号问题

  problem_description:
    type: text
    label: 问题描述
    description: 用户遇到的问题详细描述

  ticket_id:
    type: text
    label: 工单编号
    description: 创建成功的工单编号

flows:
  onboarding:
    name: 欢迎引导
    description: 在聊天窗口初次打开时欢迎用户，并介绍听书助手可处理的服务。通常由系统主动触发。
    steps:
      - id: start
        type: start
        next: respond

      - id: respond
        type: action
        action: action_response
        args:
          text: "你好，这里是听书智能客服。我可以帮你查询有声书、查订单、查播放进度，或者提交退款申请、客服工单。"
        next: end

      - id: end
        type: end
        next: [ ]

  order_query:
    name: 订单查询
    description: 帮用户查询听书订单的状态、支付情况和购买内容。需要用户提供订单号（订单 ID 或 ORD 开头的订单号）。
    steps:
      - id: start
        type: start
        next: list_user_orders

      - id: list_user_orders
        type: action
        action: action_list_user_orders
        args:
          refundable_only: false
        next: decide_order_input

      # Action 执行后再通过这个判断节点读取它写入的槽位。
      - id: decide_order_input
        type: start
        next:
          - if: "slots.get('order_number')"
            then: lookup_order
          - if: "slots.get('order_candidates_available')"
            then: ask_order_number
          - else: end

      - id: ask_order_number
        type: collect
        slot_name: order_number
        response:
          text: "请点击上面的订单卡片，或者输入订单 ID / ORD 开头的订单号。"
        next: lookup_order

      - id: lookup_order
        type: action
        action: action_lookup_order
        next: decide_order_result

      - id: decide_order_result
        type: start
        next:
          - if: "slots.get('order_found')"
            then: show_order
          - else: end

      - id: show_order
        type: action
        action: action_show_order_card
        next: end

      - id: end
        type: end
        next: [ ]

  playback_query:
    name: 播放记录查询
    description: 帮用户查询最近收听的有声书播放进度、章节名称和播放位置。可以按书名查询，也可以查询最近所有收听记录。
    steps:
      - id: start
        type: start
        next: ask_book_name

      - id: ask_book_name
        type: collect
        slot_name: book_name
        response:
          text: "你想查询哪本有声书的播放进度？如果想查最近的收听记录，可以直接说“最近听的”。"
        next: lookup_playback

      - id: lookup_playback
        type: action
        action: action_lookup_playback
        next: show_playback

      - id: show_playback
        type: action
        action: action_response
        args:
          text: "{{ slots.playback_summary }}"
        next: end

      - id: end
        type: end
        next: [ ]

  refund_request:
    name: 退款申请
    description: 帮用户申请退款。收集订单号、退款原因、退款类型后，向平台提交退款申请并返回处理结果。
    steps:
      - id: start
        type: start
        next: list_refundable_orders

      - id: list_refundable_orders
        type: action
        action: action_list_user_orders
        args:
          refundable_only: true
        next: decide_refund_order_input

      - id: decide_refund_order_input
        type: start
        next:
          - if: "slots.get('order_number')"
            then: check_refund_order
          - if: "slots.get('order_candidates_available')"
            then: ask_order_number
          - else: end

      - id: ask_order_number
        type: collect
        slot_name: order_number
        response:
          text: "请选择上面的订单卡片，或者输入你要退款的订单号。"
        next: check_refund_order

      - id: check_refund_order
        type: action
        action: action_check_refund_order
        next: decide_refund_order

      - id: decide_refund_order
        type: start
        next:
          - if: "slots.get('refund_order_valid')"
            then: ask_refund_reason
          - else: end

      - id: ask_refund_reason
        type: collect
        slot_name: refund_reason
        response:
          text: "请简单说一下退款原因。"
        next: ask_refund_type

      - id: ask_refund_type
        type: collect
        slot_name: refund_type
        response:
          text: "你要申请全额退款还是部分退款？"
        next: create_refund

      - id: create_refund
        type: action
        action: action_create_refund
        next: show_refund_result

      - id: show_refund_result
        type: action
        action: action_response
        args:
          text: "{{ slots.refund_result }}"
        next: end

      - id: end
        type: end
        next: [ ]

  ticket_submit:
    name: 工单提交
    description: 帮用户提交客服工单。收集工单类型（播放异常、投诉、退款、账号问题等）和问题描述后创建工单，返回工单编号。
    steps:
      - id: start
        type: start
        next: ask_ticket_category

      - id: ask_ticket_category
        type: collect
        slot_name: ticket_category
        response:
          text: "请问你遇到的问题属于哪种类型？可选：播放异常、投诉、退款、账号问题、其他。"
        next: ask_problem_description

      - id: ask_problem_description
        type: collect
        slot_name: problem_description
        response:
          text: "请详细描述一下你遇到的问题。"
        next: create_ticket

      - id: create_ticket
        type: action
        action: action_create_ticket
        next: show_ticket_result

      - id: show_ticket_result
        type: action
        action: action_response
        args:
          text: "{{ slots.ticket_id }}"
        next: end

      - id: end
        type: end
        next: [ ]

  human_handoff:
    name: 人工客服
    description: 将当前对话转交给人工客服处理。
    steps:
      - id: start
        type: start
        next: respond

      - id: respond
        type: action
        action: action_response
        args:
          text: "好的，我来为你转接人工客服，请稍等。"
        next: end

      - id: end
        type: end
        next: [ ]
