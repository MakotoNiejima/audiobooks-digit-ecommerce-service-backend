<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>听书智能客服</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --purple:#8B5CF6; --blue:#3B82F6; --pink:#EC4899;
    --grad:linear-gradient(135deg,#8B5CF6 0%,#3B82F6 50%,#EC4899 100%);
    --grad-soft:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#f472b6 100%);
    --bg:#f6f7fb; --card:#ffffff; --line:#eceef5;
    --txt:#1f2330; --sub:#8a90a2; --bubble-bot:#ffffff; --bubble-user:transparent;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
  button{font-family:inherit;cursor:pointer;border:none}
  input,textarea{font-family:inherit}

  /* ===== 登录页 ===== */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#fff;overflow:hidden}
  #login::before{content:"";position:absolute;top:-200px;left:-150px;width:520px;height:520px;
    background:var(--grad);filter:blur(120px);opacity:.35;border-radius:50%}
  #login::after{content:"";position:absolute;bottom:-200px;right:-150px;width:520px;height:520px;
    background:var(--grad-soft);filter:blur(120px);opacity:.3;border-radius:50%}
  .login-card{position:relative;z-index:1;width:360px;background:var(--card);
    border:1px solid var(--line);border-radius:22px;padding:36px 32px;
    box-shadow:0 20px 60px rgba(80,70,160,.12)}
  .login-logo{width:64px;height:64px;border-radius:18px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;
    box-shadow:0 10px 24px rgba(139,92,246,.4)}
  .login-title{text-align:center;font-size:22px;font-weight:700;margin:0 0 4px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .login-sub{text-align:center;color:var(--sub);font-size:13px;margin:0 0 26px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;color:var(--sub);margin-bottom:6px;font-weight:500}
  .field input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;background:#fafbff;outline:none;transition:.15s}
  .field input:focus{border-color:var(--purple);background:#fff;box-shadow:0 0 0 4px rgba(139,92,246,.12)}
  .login-btn{width:100%;padding:13px;border-radius:12px;background:var(--grad);color:#fff;
    font-size:15px;font-weight:600;box-shadow:0 8px 20px rgba(139,92,246,.35);transition:.15s}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(139,92,246,.45)}
  .login-hint{text-align:center;color:var(--sub);font-size:12px;margin-top:14px}
  .login-err{color:var(--pink);font-size:12px;text-align:center;margin-top:8px;min-height:16px}

  /* ===== 主界面 ===== */
  #app{display:none;height:100%}
  .layout{display:flex;height:100%}
  /* 侧栏 */
  .sidebar{width:268px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
  .side-head{padding:18px 16px 12px;display:flex;align-items:center;gap:10px}
  .side-logo{width:36px;height:36px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 6px 14px rgba(139,92,246,.35)}
  .side-title{font-weight:700;font-size:15px}
  .side-new{margin:4px 12px 8px;padding:11px;border-radius:12px;background:var(--grad);color:#fff;font-size:14px;font-weight:600;box-shadow:0 6px 16px rgba(139,92,246,.3);display:flex;align-items:center;justify-content:center;gap:6px}
  .side-new:hover{filter:brightness(1.05)}
  .side-list{flex:1;overflow-y:auto;padding:4px 8px}
  .side-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:11px;cursor:pointer;margin-bottom:2px;transition:.12s;position:relative}
  .side-item:hover{background:#f4f5fb}
  .side-item.active{background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(236,72,153,.10))}
  .side-item.active .side-name{color:var(--purple);font-weight:600}
  .side-avatar{width:32px;height:32px;border-radius:10px;background:var(--grad-soft);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0}
  .side-meta{flex:1;min-width:0}
  .side-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .side-preview{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .side-del{position:absolute;right:8px;opacity:0;color:var(--sub);font-size:14px;background:none;padding:4px}
  .side-item:hover .side-del{opacity:1}
  .side-del:hover{color:var(--pink)}
  .side-foot{padding:10px 14px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);display:flex;justify-content:space-between;align-items:center}
  .side-logout{color:var(--sub);background:none;font-size:12px}
  .side-logout:hover{color:var(--pink)}

  /* 主区 */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
  .topbar{height:58px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
  .top-left{display:flex;align-items:center;gap:10px}
  .top-avatar{width:34px;height:34px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px}
  .top-name{font-weight:600;font-size:15px}
  .top-status{font-size:12px;color:#22c55e;margin-left:8px;display:flex;align-items:center;gap:4px}
  .top-status::before{content:"";width:7px;height:7px;border-radius:50%;background:#22c55e}
  .menu-btn{display:none;background:none;font-size:20px;color:var(--sub)}

  .msgs{flex:1;overflow-y:auto;padding:24px 0}
  .msgs-inner{max-width:760px;margin:0 auto;padding:0 20px}
  .msg{display:flex;gap:10px;margin:14px 0;align-items:flex-start}
  .msg.user{flex-direction:row-reverse}
  .av{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;flex-shrink:0}
  .av.bot{background:var(--grad);box-shadow:0 4px 10px rgba(139,92,246,.3)}
  .av.user{background:var(--grad-soft)}
  .bubble-wrap{display:flex;flex-direction:column;max-width:74%}
  .msg.user .bubble-wrap{align-items:flex-end}
  .bubble{padding:11px 15px;border-radius:16px;font-size:14.5px;line-height:1.65;white-space:pre-wrap;word-break:break-word;box-shadow:0 2px 8px rgba(80,70,160,.06)}
  .msg.bot .bubble{background:#fff;border:1px solid var(--line);border-top-left-radius:5px}
  .msg.user .bubble{background:var(--grad);color:#fff;border-top-right-radius:5px;box-shadow:0 6px 16px rgba(139,92,246,.28)}
  .card{margin-top:8px;padding:12px 14px;border:1.5px solid #e4dcff;border-radius:14px;background:linear-gradient(135deg,#faf8ff,#f6fbff);cursor:pointer;transition:.15s;max-width:340px}
  .card:hover{border-color:var(--purple);box-shadow:0 8px 20px rgba(139,92,246,.18);transform:translateY(-1px)}
  .card-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .card-tag{font-size:11px;color:#fff;background:var(--grad);border-radius:6px;padding:2px 8px;font-weight:600}
  .card-title{font-weight:600;font-size:14px}
  .card-attrs{font-size:12px;color:var(--sub)}
  .card-hint{font-size:11.5px;color:var(--purple);margin-top:6px}
  .cursor{display:inline-block;width:7px;height:15px;background:var(--purple);margin-left:2px;vertical-align:middle;animation:blink 1s steps(2) infinite;border-radius:2px}
  @keyframes blink{50%{opacity:0}}

  /* 空状态 */
  .empty{max-width:560px;margin:8vh auto;text-align:center}
  .empty-logo{width:72px;height:72px;border-radius:22px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px;box-shadow:0 14px 32px rgba(139,92,246,.35)}
  .empty h2{font-size:20px;margin:0 0 6px}
  .empty p{color:var(--sub);font-size:14px;margin:0 0 22px}
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .chip{padding:10px 16px;background:#fff;border:1px solid var(--line);border-radius:20px;font-size:13.5px;color:var(--txt);transition:.15s}
  .chip:hover{border-color:var(--purple);color:var(--purple);background:#faf8ff;transform:translateY(-1px)}

  /* 输入区 */
  .composer{flex-shrink:0;background:#fff;border-top:1px solid var(--line);padding:14px 20px}
  .composer-inner{max-width:760px;margin:0 auto;display:flex;gap:10px;align-items:flex-end;background:#fafbff;border:1.5px solid var(--line);border-radius:16px;padding:8px 8px 8px 14px;transition:.15s}
  .composer-inner:focus-within{border-color:var(--purple);background:#fff;box-shadow:0 0 0 4px rgba(139,92,246,.1)}
  #text{flex:1;border:none;outline:none;background:transparent;font-size:15px;line-height:1.5;resize:none;max-height:120px;padding:6px 0}
  .send-btn{width:38px;height:38px;border-radius:11px;background:var(--grad);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(139,92,246,.35);transition:.15s}
  .send-btn:hover{transform:scale(1.05)}
  .send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  /* 滚动条 */
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#d8dbe6;border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:#c0c4d4}

  @media(max-width:760px){
    .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:20;transform:translateX(-100%);transition:.2s;box-shadow:0 0 40px rgba(0,0,0,.15)}
    .sidebar.open{transform:none}
    .menu-btn{display:block}
    .bubble-wrap{max-width:84%}
  }
</style>
<style id="editorial-theme">
  :root{
    --paper:#f6f4ef;
    --paper-deep:#efede6;
    --surface:#fffefa;
    --surface-strong:#ffffff;
    --ink:#182033;
    --ink-soft:#596174;
    --muted:#8c92a0;
    --line:#e5e1d8;
    --line-strong:#d8d2c5;
    --brand:#6956d9;
    --brand-dark:#5140bd;
    --brand-soft:#eeeafd;
    --accent:#e9894f;
    --success:#2c8d68;
    --danger:#c45555;
    --shadow-sm:0 2px 10px rgba(36,32,24,.05);
    --shadow-md:0 14px 38px rgba(36,32,24,.09);
    --shadow-brand:0 10px 24px rgba(105,86,217,.20);
    --grad:linear-gradient(135deg,#7664e3 0%,#5c49ca 100%);
    --grad-soft:linear-gradient(135deg,#7b69e6 0%,#e58b62 100%);
    --bg:var(--paper);
    --card:var(--surface);
    --txt:var(--ink);
    --sub:var(--muted);
  }

  *{scrollbar-color:#c9c3b8 transparent;scrollbar-width:thin}
  body{background:var(--paper);color:var(--ink);letter-spacing:.005em}
  button,input,textarea{font-family:inherit}

  /* 登录 */
  #login{
    background:
      radial-gradient(circle at 12% 18%,rgba(105,86,217,.13),transparent 30%),
      radial-gradient(circle at 88% 82%,rgba(233,137,79,.12),transparent 28%),
      var(--paper);
  }
  #login::before,#login::after{display:none}
  .login-card{
    width:410px;padding:42px 40px 34px;border:1px solid rgba(216,210,197,.9);
    border-radius:28px;background:rgba(255,254,250,.92);box-shadow:0 28px 80px rgba(47,40,28,.12);
    backdrop-filter:blur(16px)
  }
  .login-card::before{
    content:"AUDIOBOOK CONCIERGE";display:block;text-align:center;margin-bottom:22px;
    color:var(--accent);font-size:10px;font-weight:800;letter-spacing:.22em
  }
  .login-logo,.side-logo{
    background:var(--ink);box-shadow:none;color:#fff;position:relative;overflow:hidden
  }
  .login-logo{width:66px;height:66px;border-radius:22px;font-size:30px;margin-bottom:18px}
  .login-logo::after,.side-logo::after{
    content:"";position:absolute;width:30px;height:30px;border-radius:50%;right:-10px;bottom:-10px;
    background:var(--accent);opacity:.95
  }
  .login-title{color:var(--ink);background:none;-webkit-text-fill-color:initial;font-size:24px;letter-spacing:-.02em}
  .login-sub{margin-top:7px;margin-bottom:30px;color:var(--ink-soft)}
  .field label{color:var(--ink-soft);font-size:12px;font-weight:650;letter-spacing:.03em}
  .field input{
    padding:13px 15px;border:1px solid var(--line);border-radius:14px;background:#fbfaf6;color:var(--ink)
  }
  .field input:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(105,86,217,.10);background:#fff}
  .login-btn{
    margin-top:4px;padding:14px;border-radius:14px;background:var(--ink);box-shadow:none;font-weight:700
  }
  .login-btn:hover{background:#252e43;box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .login-hint{margin-top:18px;line-height:1.7;color:var(--muted)}
  .login-err{color:var(--danger)}

  /* 主框架 */
  #app,.layout{background:var(--paper)}
  .sidebar{
    width:286px;background:#f1efe9;border-right:1px solid var(--line);padding:0 10px
  }
  .side-head{height:72px;padding:16px 10px 12px;gap:12px}
  .side-logo{width:40px;height:40px;border-radius:13px;font-size:18px}
  .side-title{font-size:16px;letter-spacing:-.015em}
  .side-new{
    margin:8px 4px 16px;padding:12px;border:1px solid var(--line-strong);border-radius:13px;
    background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm);font-size:13px
  }
  .side-new:hover{filter:none;border-color:#c7c0b2;background:#fff;transform:translateY(-1px)}
  .side-list{padding:0 0 12px}
  .side-list::before{
    content:"最近会话";display:block;padding:1px 11px 9px;color:var(--muted);
    font-size:10px;font-weight:750;letter-spacing:.12em
  }
  .side-item{margin:3px 0;padding:11px 10px;border:1px solid transparent;border-radius:14px;gap:11px}
  .side-item:hover{background:rgba(255,255,255,.62);border-color:rgba(216,210,197,.65)}
  .side-item.active{background:var(--surface);border-color:var(--line);box-shadow:var(--shadow-sm)}
  .side-item.active .side-name{color:var(--ink);font-weight:700}
  .side-avatar{
    width:36px;height:36px;border-radius:12px;background:var(--brand-soft);color:var(--brand-dark);font-weight:750
  }
  .side-item.active .side-avatar{background:var(--brand);color:#fff}
  .side-name{font-size:13.5px}
  .side-preview{font-size:11.5px;color:var(--muted)}
  .side-del{color:var(--muted)}
  .side-foot{margin:0 -10px;padding:14px 20px;border-color:var(--line);background:rgba(255,255,255,.38)}

  .main{background:var(--paper)}
  .topbar{
    height:72px;padding:0 28px;background:rgba(255,254,250,.88);border-color:var(--line);
    backdrop-filter:blur(16px);z-index:5
  }
  .top-left{gap:12px}
  .top-avatar{
    width:38px;height:38px;border-radius:13px;background:var(--ink);box-shadow:none;font-size:16px
  }
  .top-name{font-size:15px;color:var(--ink)}
  .top-caption{margin-top:2px;color:var(--muted);font-size:10.5px}
  .top-status{color:var(--success);font-size:11.5px;font-weight:650}
  .top-status::before{width:6px;height:6px;background:var(--success)}
  #userAvatar{background:var(--brand-soft)!important;color:var(--brand-dark)!important;font-weight:750}

  /* 对话区 */
  .msgs{padding:0;background:
    linear-gradient(rgba(246,244,239,.92),rgba(246,244,239,.92)),
    radial-gradient(circle at 50% 0,rgba(105,86,217,.08),transparent 42%)}
  .msgs-inner{max-width:860px;padding:30px 28px 44px}
  .msg{gap:12px;margin:17px 0;align-items:flex-start}
  .msg.bot + .msg.bot{margin-top:-7px}
  .msg.bot + .msg.bot .av{visibility:hidden}
  .av{width:34px;height:34px;border-radius:12px;font-size:14px}
  .av.bot{background:var(--ink);box-shadow:none}
  .av.user{background:var(--brand);box-shadow:none}
  .bubble-wrap{max-width:min(74%,620px)}
  .bubble{
    padding:11px 15px;border-radius:15px;font-size:14px;line-height:1.72;box-shadow:none
  }
  .msg.bot .bubble{
    background:var(--surface-strong);border:1px solid var(--line);border-top-left-radius:5px;
    box-shadow:var(--shadow-sm)
  }
  .msg.user .bubble{
    color:#fff;background:var(--brand);border:none;border-top-right-radius:5px;box-shadow:var(--shadow-brand)
  }

  /* 订单与内容卡片 */
  .card{
    width:min(100%,470px);max-width:470px;margin-top:0;padding:0;border:1px solid var(--line);
    border-radius:18px;background:var(--surface-strong);box-shadow:var(--shadow-sm);overflow:hidden
  }
  .card:hover{border-color:#bfb5eb;box-shadow:0 12px 28px rgba(60,48,35,.10);transform:translateY(-2px)}
  .card-main{padding:15px 17px 13px}
  .card-head{margin:0 0 12px;justify-content:space-between;align-items:flex-start}
  .card-ident{display:flex;gap:9px;align-items:center;min-width:0}
  .card-tag{
    flex-shrink:0;padding:3px 8px;border-radius:7px;background:var(--brand-soft);color:var(--brand-dark);
    font-size:10px;letter-spacing:.04em
  }
  .card-title{font-size:14px;font-weight:750;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-status{
    flex-shrink:0;padding:4px 8px;border-radius:999px;background:#e8f5ef;color:var(--success);
    font-size:10.5px;font-weight:700
  }
  .card-status.neutral{background:#f0eee8;color:#777165}
  .card-body{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
  .card-meta{min-width:0;color:var(--muted);font-size:11.5px;line-height:1.7}
  .card-price{flex-shrink:0;color:var(--ink);font-size:18px;font-weight:780;letter-spacing:-.025em}
  .card-price small{font-size:11px;font-weight:650;margin-right:1px}
  .card-hint{
    margin:0;padding:10px 17px;border-top:1px solid #efede7;background:#faf9f5;
    color:var(--brand-dark);font-size:11.5px;font-weight:650;display:flex;justify-content:space-between
  }
  .card-hint::after{content:"→";font-size:14px;line-height:1}
  .msg.user .card{background:#f4f1ff;border-color:#ded7fa;box-shadow:none}
  .msg.user .card-hint{display:none}

  /* 欢迎空状态 */
  .empty{max-width:640px;margin:7vh auto 0;padding:0 16px}
  .empty-logo{width:64px;height:64px;border-radius:21px;background:var(--ink);box-shadow:var(--shadow-md);font-size:30px}
  .empty h2{font-size:24px;letter-spacing:-.025em;margin-top:20px}
  .empty p{font-size:14px;color:var(--ink-soft);line-height:1.7}
  .chips{gap:9px;margin-top:26px}
  .chip{
    padding:10px 14px;border:1px solid var(--line);border-radius:12px;background:var(--surface);
    color:var(--ink-soft);box-shadow:var(--shadow-sm);font-size:12.5px
  }
  .chip:hover{border-color:#bbb1e6;color:var(--brand-dark);background:#fff;transform:translateY(-1px)}

  /* 输入框 */
  .composer{padding:14px 26px 18px;background:linear-gradient(180deg,rgba(246,244,239,0),var(--paper) 26%);border:0}
  .composer-inner{
    max-width:820px;padding:8px 8px 8px 16px;border:1px solid var(--line-strong);border-radius:18px;
    background:var(--surface-strong);box-shadow:0 14px 38px rgba(43,37,28,.10)
  }
  .composer-inner:focus-within{border-color:#aaa0df;box-shadow:0 14px 40px rgba(72,57,42,.12),0 0 0 3px rgba(105,86,217,.08)}
  #text{font-size:14px;color:var(--ink)}
  #text::placeholder{color:#aaa69d}
  .send-btn{
    width:40px;height:40px;border-radius:13px;background:var(--brand);box-shadow:none;font-size:15px
  }
  .send-btn:hover{background:var(--brand-dark);transform:translateY(-1px)}
  .cursor{background:var(--brand)}

  /* 当前用户订单面板 */
  .orders-toggle{
    display:flex;align-items:center;gap:7px;padding:8px 11px;border:1px solid var(--line);
    border-radius:11px;background:var(--surface);color:var(--ink-soft);font-size:12px;font-weight:650
  }
  .orders-toggle:hover{border-color:#bbb1e6;color:var(--brand-dark);background:#fff}
  .orders-count{
    min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:var(--brand-soft);
    color:var(--brand-dark);font-size:10px;display:flex;align-items:center;justify-content:center
  }
  .context-panel{
    width:318px;flex-shrink:0;background:#f1efe9;border-left:1px solid var(--line);
    display:flex;flex-direction:column;z-index:10
  }
  .orders-head{height:72px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .orders-head h3{margin:0;font-size:14px;letter-spacing:-.01em}
  .orders-head p{margin:3px 0 0;color:var(--muted);font-size:10.5px}
  .orders-refresh,.orders-close{width:30px;height:30px;border-radius:9px;background:transparent;color:var(--muted);font-size:15px}
  .orders-refresh:hover,.orders-close:hover{background:var(--surface);color:var(--ink)}
  .orders-close{display:none}
  .orders-list{flex:1;overflow:auto;padding:14px 12px 24px}
  .orders-state{padding:34px 15px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7}
  .panel-order{
    margin-bottom:10px;padding:14px;border:1px solid var(--line);border-radius:16px;
    background:var(--surface);box-shadow:var(--shadow-sm);transition:.15s
  }
  .panel-order:hover{border-color:#c6bee8;transform:translateY(-1px)}
  .panel-order-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .panel-order-name{font-size:12px;font-weight:760;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .panel-order-no{margin-top:4px;color:var(--muted);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .panel-order-price{flex-shrink:0;font-size:15px;font-weight:780;color:var(--ink)}
  .panel-order-price small{font-size:10px;margin-right:1px}
  .panel-order-meta{display:flex;align-items:center;gap:7px;margin-top:11px;color:var(--muted);font-size:10.5px}
  .panel-order-status{padding:3px 7px;border-radius:999px;background:#e8f5ef;color:var(--success);font-weight:700}
  .panel-order-status.neutral{background:#ece9e2;color:#746e63}
  .panel-order-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}
  .panel-order-actions button{padding:8px;border-radius:9px;font-size:11px;font-weight:700}
  .order-query-btn{background:var(--brand-soft);color:var(--brand-dark)}
  .order-query-btn:hover{background:#e3ddfb}
  .order-refund-btn{background:var(--ink);color:#fff}
  .order-refund-btn:hover{background:#293247}
  .order-refund-btn:disabled{background:#e6e2da;color:#aaa49a;cursor:not-allowed}
  .orders-backdrop{display:none}

  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-thumb{background:#cbc5b9;border-radius:10px;border:2px solid transparent;background-clip:padding-box}

  @media(max-width:900px){
    .sidebar{width:260px}
    .msgs-inner{padding-left:20px;padding-right:20px}
  }
  @media(max-width:1180px){
    .context-panel{
      position:fixed;top:0;right:0;bottom:0;width:min(340px,88vw);transform:translateX(105%);
      transition:transform .22s ease;box-shadow:-20px 0 55px rgba(35,30,24,.15)
    }
    .context-panel.open{transform:none}
    .orders-close{display:block}
    .orders-backdrop{position:fixed;inset:0;background:rgba(24,32,51,.22);z-index:9;backdrop-filter:blur(2px)}
    .orders-backdrop.show{display:block}
  }
  @media(max-width:760px){
    .sidebar{padding:0 10px;background:#f1efe9}
    .topbar{height:64px;padding:0 16px}
    .msgs-inner{padding:20px 14px 34px}
    .bubble-wrap{max-width:86%}
    .composer{padding:10px 12px 14px}
    .card{max-width:100%}
    .login-card{width:calc(100% - 32px);padding:34px 24px 28px}
  }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">🎧</div>
    <h1 class="login-title">听书智能客服</h1>
    <p class="login-sub">有问题，随时问我</p>
    <form id="loginForm">
      <div class="field">
        <label>账户名（即用户ID）</label>
        <input id="loginAccount" placeholder="例如：2" autocomplete="off" />
      </div>
      <div class="field">
        <label>密码</label>
        <input id="loginPassword" type="password" placeholder="随便填即可" />
      </div>
      <div class="login-err" id="loginErr"></div>
      <button class="login-btn" type="submit">进 入</button>
      <div class="login-hint">测试账户：2（订单/退款）· 3（退款）· 1（播放进度）</div>
    </form>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <div class="side-logo">🎧</div>
        <div class="side-title">听书智能客服</div>
      </div>
      <button class="side-new" id="btnNew">＋ 新建会话</button>
      <div class="side-list" id="sideList"></div>
      <div class="side-foot">
        <span id="footAccount"></span>
        <button class="side-logout" id="btnLogout">退出登录</button>
      </div>
    </aside>

    <section class="main">
      <div class="topbar">
        <div class="top-left">
          <button class="menu-btn" id="btnMenu">☰</button>
          <div class="top-avatar">🎧</div>
          <div>
            <div class="top-name">听书智能客服</div>
            <div class="top-caption">订单、播放与售后助手</div>
          </div>
          <span class="top-status">在线</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="orders-toggle" id="btnOrders" type="button">我的订单 <span class="orders-count" id="ordersCount">0</span></button>
          <div class="top-avatar" id="userAvatar" style="width:30px;height:30px;font-size:13px">U</div>
          <span style="font-size:13px;color:var(--sub)">用户 <b id="topUserId" style="color:var(--txt)"></b></span>
        </div>
      </div>

      <div class="msgs" id="msgs">
        <div class="msgs-inner" id="msgsInner"></div>
      </div>

      <div class="composer">
        <div class="composer-inner">
          <textarea id="text" rows="1" placeholder="输入消息，回车发送…"></textarea>
          <button class="send-btn" id="btnSend">➤</button>
        </div>
      </div>
    </section>

    <aside class="context-panel" id="ordersPanel">
      <div class="orders-head">
        <div><h3>我的订单</h3><p>最近订单与快捷操作</p></div>
        <div style="display:flex;gap:3px">
          <button class="orders-refresh" id="btnRefreshOrders" title="刷新订单">↻</button>
          <button class="orders-close" id="btnCloseOrders" title="关闭">×</button>
        </div>
      </div>
      <div class="orders-list" id="ordersList"><div class="orders-state">正在加载订单…</div></div>
    </aside>
    <div class="orders-backdrop" id="ordersBackdrop"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const LS_SESSIONS = 'audiobook_sessions';   // [{account}]
const LS_CURRENT = 'audiobook_current';

let sessions = JSON.parse(localStorage.getItem(LS_SESSIONS) || '[]');
let current = localStorage.getItem(LS_CURRENT) || null;
let streaming = false;
let streamingBubble = null;

/* ---------- 登录 ---------- */
$('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const acc = $('loginAccount').value.trim();
  if (!acc) { $('loginErr').textContent = '请输入账户名'; return; }
  if (!/^\d+$/.test(acc)) { $('loginErr').textContent = '当前演示环境请使用数字用户 ID，例如 2 或 3'; return; }
  $('loginErr').textContent = '';
  if (!sessions.find(s => s.account === acc)) sessions.push({ account: acc });
  current = acc;
  saveSessions();
  enterApp();
});

function saveSessions(){ localStorage.setItem(LS_SESSIONS, JSON.stringify(sessions)); }
function saveCurrent(){ localStorage.setItem(LS_CURRENT, current); }

function enterApp(){
  $('login').style.display = 'none';
  $('app').style.display = 'block';
  renderSidebar();
  selectSession(current);
}

/* ---------- 侧栏 ---------- */
function renderSidebar(){
  const list = $('sideList');
  list.innerHTML = '';
  sessions.forEach(s => {
    const item = document.createElement('div');
    item.className = 'side-item' + (s.account === current ? ' active' : '');
    item.innerHTML = `
      <div class="side-avatar">${s.account.slice(0,1).toUpperCase()}</div>
      <div class="side-meta">
        <div class="side-name">用户 ${s.account}</div>
        <div class="side-preview">点击进入会话</div>
      </div>
      <button class="side-del" title="删除">✕</button>`;
    item.onclick = () => selectSession(s.account);
    item.querySelector('.side-del').onclick = e => { e.stopPropagation(); deleteSession(s.account); };
    list.appendChild(item);
  });
  $('footAccount').textContent = '当前：用户 ' + (current || '-');
}

$('btnNew').onclick = () => {
  const acc = prompt('输入新的账户名（用户ID，例如 3）');
  if (!acc) return;
  if (!/^\d+$/.test(acc.trim())) { alert('当前演示环境请使用数字用户 ID，例如 2 或 3'); return; }
  const normalizedAcc = acc.trim();
  if (!sessions.find(s => s.account === normalizedAcc)) sessions.push({ account: normalizedAcc });
  saveSessions();
  current = normalizedAcc; saveCurrent();
  renderSidebar(); selectSession(current);
};

function deleteSession(acc){
  sessions = sessions.filter(s => s.account !== acc);
  saveSessions();
  if (current === acc){
    current = sessions.length ? sessions[0].account : null;
    saveCurrent();
    if (current) selectSession(current); else { $('app').style.display='none'; $('login').style.display='flex'; }
  } else renderSidebar();
}

$('btnLogout').onclick = () => {
  localStorage.removeItem(LS_CURRENT);
  current = null;
  $('app').style.display = 'none';
  $('login').style.display = 'flex';
  $('loginAccount').value = '';
  $('loginPassword').value = '';
};

$('btnMenu').onclick = () => $('sidebar').classList.toggle('open');

/* ---------- 会话切换 ---------- */
async function selectSession(acc){
  current = acc; saveCurrent();
  $('sidebar').classList.remove('open');
  renderSidebar();
  $('topUserId').textContent = acc;
  $('userAvatar').textContent = acc.slice(0,1).toUpperCase();
  $('msgsInner').innerHTML = '';
  await Promise.all([loadHistory(acc), loadRecentOrders(acc)]);
}

async function loadHistory(acc){
  try{
    const r = await fetch('/api/chat/history?sender_id=' + encodeURIComponent(acc));
    const data = await r.json();
    const msgs = data.messages || [];
    if (msgs.length === 0){ renderEmpty(); return; }
    msgs.forEach(m => addMessage(m.role === 'user' ? 'user' : 'bot', m.text, m.object));
  }catch(e){ addMessage('bot','拉取历史失败：'+e.message); }
}

/* ---------- 当前用户订单 ---------- */
async function loadRecentOrders(acc){
  const list = $('ordersList');
  list.innerHTML = '<div class="orders-state">正在加载订单…</div>';
  $('ordersCount').textContent = '0';
  try{
    const response = await fetch('/api/orders/recent?sender_id=' + encodeURIComponent(acc) + '&limit=5');
    const data = await response.json();
    if (!response.ok) throw new Error(data.detail || '订单加载失败');
    const orders = data.orders || [];
    $('ordersCount').textContent = String(orders.length);
    list.innerHTML = '';
    if (!orders.length){
      list.innerHTML = '<div class="orders-state">当前账号还没有订单<br>购买内容后会显示在这里</div>';
      return;
    }
    orders.forEach(order => list.appendChild(renderPanelOrder(order)));
  }catch(error){
    list.innerHTML = '';
    const state = document.createElement('div');
    state.className = 'orders-state';
    state.textContent = error.message || '订单加载失败';
    list.appendChild(state);
  }
}

function renderPanelOrder(order){
  const attrs = order.attributes || {};
  const item = document.createElement('article');
  item.className = 'panel-order';
  item.innerHTML = `
    <div class="panel-order-top">
      <div style="min-width:0"><div class="panel-order-name"></div><div class="panel-order-no"></div></div>
      <div class="panel-order-price"><small>¥</small><span></span></div>
    </div>
    <div class="panel-order-meta"><span class="panel-order-status"></span><span class="panel-order-type"></span></div>
    <div class="panel-order-actions">
      <button class="order-query-btn" type="button">查看详情</button>
      <button class="order-refund-btn" type="button">申请退款</button>
    </div>`;

  item.querySelector('.panel-order-name').textContent = attrs.itemName || order.title || '听书订单';
  item.querySelector('.panel-order-no').textContent = attrs.orderNo || order.title || order.id;
  const numericAmount = Number(attrs.amount);
  item.querySelector('.panel-order-price span').textContent = Number.isFinite(numericAmount)
    ? numericAmount.toFixed(2)
    : String(attrs.amount ?? '--');

  const status = item.querySelector('.panel-order-status');
  status.textContent = attrs.status || '未知状态';
  if (attrs.statusRaw !== 'paid') status.classList.add('neutral');
  item.querySelector('.panel-order-type').textContent = attrs.orderType || '';

  item.querySelector('.order-query-btn').onclick = () => sendObject(order, 'query');
  const refundButton = item.querySelector('.order-refund-btn');
  refundButton.disabled = !attrs.refundable;
  refundButton.title = attrs.refundable ? '进入退款申请' : '当前订单状态不可退款';
  refundButton.onclick = () => sendObject(order, 'refund');
  return item;
}

function openOrdersPanel(){
  $('ordersPanel').classList.add('open');
  $('ordersBackdrop').classList.add('show');
}

function closeOrdersPanel(){
  $('ordersPanel').classList.remove('open');
  $('ordersBackdrop').classList.remove('show');
}

$('btnOrders').onclick = openOrdersPanel;
$('btnCloseOrders').onclick = closeOrdersPanel;
$('ordersBackdrop').onclick = closeOrdersPanel;
$('btnRefreshOrders').onclick = () => current && loadRecentOrders(current);

function renderEmpty(){
  const el = document.createElement('div');
  el.className = 'empty';
  el.innerHTML = `
    <div class="empty-logo">🎧</div>
    <h2>你好，用户 ${current}</h2>
    <p>我是听书智能客服，查订单、查播放进度、退款、推荐有声书都可以找我</p>
    <div class="chips">
      <div class="chip">帮我查订单 ORD000000000002</div>
      <div class="chip">推荐几本高评分有声书</div>
      <div class="chip">我最近听到哪了</div>
      <div class="chip">我要退款</div>
    </div>`;
  el.querySelectorAll('.chip').forEach(c => c.onclick = () => { $('text').value = c.textContent; send(); });
  $('msgsInner').appendChild(el);
}

/* ---------- 消息渲染 ---------- */
function addMessage(role, text, obj){
  const empty = $('msgsInner').querySelector('.empty'); if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="av ${role}">${role === 'bot' ? '🎧' : (current||'U').slice(0,1).toUpperCase()}</div><div class="bubble-wrap"></div>`;
  const wrap = div.querySelector('.bubble-wrap');
  if (text){
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    wrap.appendChild(b);
  }
  if (obj) wrap.appendChild(renderCard(obj, role));
  $('msgsInner').appendChild(div);
  scrollBottom();
  return wrap;
}

function renderCard(obj, role){
  const card = document.createElement('div');
  card.className = 'card';
  const typeLabel = { order: '订单', audiobook: '有声书' }[obj.type] || obj.type;
  const title = obj.title || obj.id;
  const attributes = obj.attributes || {};
  const status = attributes.status || attributes.orderStatus || '';
  const amount = attributes.amount ?? attributes.payableAmount;
  const orderNo = attributes.orderNo || (obj.type === 'order' ? title : '');
  const hiddenKeys = new Set([
    'status','orderStatus','statusRaw','amount','payableAmount','orderNo','action',
    'refundable','orderType','itemName','itemCount','createdAt'
  ]);
  const extraAttrs = Object.entries(attributes)
    .filter(([key,value]) => !hiddenKeys.has(key) && value !== null && value !== undefined && value !== '')
    .slice(0,2)
    .map(([,value]) => String(value));

  card.innerHTML = `
    <div class="card-main">
      <div class="card-head">
        <div class="card-ident"><span class="card-tag"></span><span class="card-title"></span></div>
        <span class="card-status"></span>
      </div>
      <div class="card-body">
        <div class="card-meta"></div>
        <div class="card-price"><small>¥</small><span></span></div>
      </div>
    </div>`;
  card.querySelector('.card-tag').textContent = typeLabel;
  card.querySelector('.card-title').textContent = title;

  const statusEl = card.querySelector('.card-status');
  if (status){
    statusEl.textContent = status;
    if (!String(status).includes('已支付') && !String(status).includes('成功')) statusEl.classList.add('neutral');
  } else {
    statusEl.remove();
  }

  const metaParts = [];
  if (orderNo && orderNo !== title) metaParts.push('订单号 ' + orderNo);
  if (attributes.itemName) metaParts.push(String(attributes.itemName));
  else if (attributes.orderType) metaParts.push(String(attributes.orderType));
  metaParts.push(...extraAttrs);
  card.querySelector('.card-meta').textContent = metaParts.join(' · ') || (obj.type === 'order' ? '点击查看这笔订单' : '点击查看内容详情');

  const priceEl = card.querySelector('.card-price');
  if (amount !== null && amount !== undefined && amount !== ''){
    const numericAmount = Number(amount);
    priceEl.querySelector('span').textContent = Number.isFinite(numericAmount)
      ? numericAmount.toFixed(2)
      : String(amount).replace(/^¥/,'');
  } else {
    priceEl.remove();
  }
  if (role === 'bot'){
    const hint = document.createElement('div');
    hint.className = 'card-hint';
    hint.textContent = obj.type === 'order' ? '选择这笔订单' : '查看' + typeLabel + '详情';
    card.appendChild(hint);
    card.onclick = () => sendObject(obj);
  }
  return card;
}

function startStreamBubble(){
  const wrap = addMessage('bot', '', null);
  const b = document.createElement('div');
  b.className = 'bubble';
  const cur = document.createElement('span');
  const caret = document.createElement('span'); caret.className = 'cursor';
  b.appendChild(cur); b.appendChild(caret);
  wrap.appendChild(b);
  streamingBubble = cur;
  scrollBottom();
}

function scrollBottom(){ const m = $('msgs'); m.scrollTop = m.scrollHeight; }

/* ---------- SSE 流式 ---------- */
function handleEvent(ev){
  if (ev.type === 'token'){
    if (!streamingBubble) startStreamBubble();
    streamingBubble.textContent += ev.text;
    scrollBottom();
  } else if (ev.type === 'message'){
    streamingBubble = null;
    addMessage('bot', ev.text, ev.object);
  } else if (ev.type === 'error'){
    streamingBubble = null;
    addMessage('bot', ev.text || '出错了');
  } else if (ev.type === 'done'){
    // 去掉残留光标
    document.querySelectorAll('.cursor').forEach(c => c.remove());
    streamingBubble = null;
  }
}

async function postStream(payload){
  const resp = await fetch('/api/chat/stream', {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  if (!resp.ok || !resp.body){ addMessage('bot','请求失败：'+resp.status); return; }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buf = '';
  while(true){
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream:true});
    let idx;
    while((idx = buf.indexOf('\n\n')) !== -1){
      const block = buf.slice(0, idx); buf = buf.slice(idx+2);
      const line = block.split('\n').find(l => l.startsWith('data:'));
      if (!line) continue;
      try{ handleEvent(JSON.parse(line.slice(5).trim())); }catch(e){}
    }
  }
  document.querySelectorAll('.cursor').forEach(c => c.remove());
  streamingBubble = null;
}

/* ---------- 发送 ---------- */
async function send(){
  if (streaming) return;
  const text = $('text').value.trim();
  if (!text) return;
  addMessage('user', text, null);
  $('text').value = '';
  autoSize();
  streaming = true;
  $('btnSend').disabled = true;
  try{ await postStream({ sender_id: current, text }); }
  catch(e){ addMessage('bot','请求失败：'+e.message); }
  finally{ streaming = false; $('btnSend').disabled = false; }
}

async function sendObject(obj, action = null){
  if (streaming) return;
  const payloadObject = action
    ? { ...obj, attributes: { ...(obj.attributes || {}), action } }
    : obj;
  addMessage('user', null, payloadObject);
  closeOrdersPanel();
  streaming = true; $('btnSend').disabled = true;
  try{ await postStream({ sender_id: current, object: payloadObject }); }
  catch(e){ addMessage('bot','请求失败：'+e.message); }
  finally{
    streaming = false;
    $('btnSend').disabled = false;
    if (current) loadRecentOrders(current);
  }
}

$('btnSend').onclick = send;
$('text').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
$('text').addEventListener('input', autoSize);
function autoSize(){ const t = $('text'); t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 120) + 'px'; }

/* ---------- 启动 ---------- */
if (current && sessions.length){ enterApp(); }
</script>
</body>
</html>
